<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css">
    <style>
        body {
            /* 폰트를 Pretendard로 변경 */
            font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f9fafb;
            color: #374151;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 90%;
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: left;
            /* 상단 테두리를 아이콘의 초록색(#66a33f)으로 변경 */
            border-top: 4px solid #66a33f;
        }
        h1 {
            font-size: 24px;
            color: #111827;
            margin-top: 0;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .error-code {
            /* 에러 코드 색상을 초록색(#66a33f)으로 변경 */
            color: #66a33f;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 24px;
        }
        .info-box {
            background-color: #f3f4f6;
            padding: 16px;
            border-radius: 6px;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
            border: 1px solid #e5e7eb;
        }
        .info-box ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .info-box li {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .info-box li:last-child {
            margin-bottom: 0;
        }
        .info-box strong {
            color: #374151;
            display: inline-block;
            width: 90px;
        }
        .footer {
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
            padding-top: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <span class="error-code">Error 1020</span>
    <h1>접근이 차단되었습니다</h1>
    <p>죄송합니다. 귀하의 요청이 보안 정책에 의해 차단되었습니다. 비정상적인 접근 시도이거나, 사이트 소유자가 귀하의 IP 주소 또는 네트워크 대역의 접근을 제한하도록 설정했을 수 있습니다.</p>

    <div class="info-box">
        <ul>
            <li><strong>Event ID:</strong> <span id="event-id">{{EVENT_ID}}</span></li>
            <li><strong>Client IP:</strong> <span id="client-ip">{{CLIENT_IP}}</span></li>
            <li><strong>Timestamp:</strong> <span id="timestamp">{{TIMESTAMP}}</span></li>
        </ul>
    </div>

    <div class="footer">
        Protected by Mini-IPS Monitorapp
    </div>
</div>

</body>
</html>
