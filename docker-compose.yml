services:
  client:
    build: ./client
    profiles: ["manual"]
    networks:
      client_net:
        ipv4_address: ${CLIENT_IP:-20.0.1.100}
    command:
      - sh
      - -c
      - >
        if command -v ip >/dev/null 2>&1; then
          ip route replace ${CLIENT_ROUTE_TO_SERVER_SUBNET:-10.0.1.0/24} via ${ROUTER_CLIENT_IP:-20.0.1.254};
        fi;
        trap : TERM INT; sleep infinity & wait
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./runtime-logs/client:/app/reports

  router:
    build: ./router
    profiles: ["manual"]
    networks:
      client_net:
        ipv4_address: ${ROUTER_CLIENT_IP:-20.0.1.254}
      server_net:
        ipv4_address: ${ROUTER_SERVER_IP:-10.0.1.254}
    command: ["/app/start.sh"]
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"

  ips:
    build: ./ips
    profiles: ["manual"]
    network_mode: none
    working_dir: /app
    command: ["sh", "-c", "trap : TERM INT; sleep infinity & wait"]
    volumes:
      - ./runtime-logs/ips:/logs
      - ./ips:/app
    environment:
      TZ: Asia/Seoul
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.conf.all.route_localnet: "1"
      net.ipv4.conf.all.rp_filter: "0"

  server:
    build: ./server
    networks:
      server_net:
        ipv4_address: ${SERVER_IP:-10.0.1.100}
    working_dir: /app
    command:
      - sh
      - -c
      - >
        if command -v ip >/dev/null 2>&1; then
          ip route replace ${SERVER_ROUTE_TO_CLIENT_SUBNET:-20.0.1.0/24} via ${ROUTER_SERVER_IP:-10.0.1.254};
        fi;
        exec /app/start-log.sh
    volumes:
      - ./runtime-logs/server:/logs
    environment:
      TZ: Asia/Seoul
      SERVER_CPU: ${SERVER_CPU:-0}
      LOG_FILE: ${SERVER_LOG_FILE:-/logs/server.log}
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN

networks:
  client_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${CLIENT_SUBNET:-20.0.1.0/24}
  server_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${SERVER_SUBNET:-10.0.1.0/24}
